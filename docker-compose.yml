services:
  postgres:
    image: postgres:16-alpine
    container_name: dentai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dentai
    volumes:
      - dentai_pgdata:/var/lib/postgresql/data

volumes:
  dentai_pgdata:
