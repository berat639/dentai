services:
  postgres:
    image: postgres:16-alpine
    container_name: dentai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dentai
    volumes:
      - dentai_pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: dentai-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/dentai"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      - postgres

volumes:
  dentai_pgdata:
