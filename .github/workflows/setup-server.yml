name: Initial Server Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 20m
          script: |
            apt update && apt upgrade -y
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt install -y nodejs nginx git
            npm install -g pm2
            command -v docker || curl -fsSL https://get.docker.com | bash
            apt install -y docker-compose-plugin || true

      - name: Clone and build app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 20m
          script: |
            mkdir -p /opt/dentai
            cd /opt/dentai
            if [ -d ".git" ]; then git pull origin main; else git clone https://github.com/berat639/dentai.git .; fi
            test -f .env || printf 'DATABASE_URL="postgresql://postgres:postgres@localhost:5432/dentai"\nGEMINI_API_KEY="CHANGE_ME"\nJWT_SECRET="CHANGE_ME"\n' > .env
            docker compose up -d || docker-compose up -d
            sleep 5
            npm install
            npx prisma generate
            npx prisma db push
            npm run build

      - name: Configure Nginx and start app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 5m
          script: |
            printf 'server {\n  listen 80;\n  server_name _;\n  location / {\n    proxy_pass http://localhost:3000;\n    proxy_http_version 1.1;\n    proxy_set_header Upgrade $http_upgrade;\n    proxy_set_header Connection upgrade;\n    proxy_set_header Host $host;\n    proxy_set_header X-Real-IP $remote_addr;\n    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n    proxy_set_header X-Forwarded-Proto $scheme;\n    proxy_cache_bypass $http_upgrade;\n  }\n}\n' > /etc/nginx/sites-available/dentai
            ln -sf /etc/nginx/sites-available/dentai /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl restart nginx
            cd /opt/dentai
            pm2 delete dentai || true
            pm2 start npm --name "dentai" -- start
            pm2 save
            pm2 startup systemd -u root --hp /root
            echo "=== DONE === App at http://185.198.74.185"
