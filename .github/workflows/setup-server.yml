name: Initial Server Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 30m
          script: |
            set -e
            echo "=== DentAI Server Setup ==="

            # Update system
            apt update && apt upgrade -y

            # Install Node.js 20
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt install -y nodejs

            # Install PM2
            npm install -g pm2

            # Install Nginx
            apt install -y nginx

            # Install Docker & Docker Compose
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | bash
            fi
            apt install -y docker-compose-plugin || true

            # Install Git
            apt install -y git

            # Create app directory
            mkdir -p /opt/dentai
            cd /opt/dentai

            # Clone or pull repo
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/berat639/dentai.git .
            fi

            # Create .env file if not exists
            if [ ! -f .env ]; then
              cat > .env << 'ENVEOF'
            DATABASE_URL="postgresql://postgres:postgres@localhost:5432/dentai"
            GEMINI_API_KEY="CHANGE_ME"
            JWT_SECRET="CHANGE_ME"
            ENVEOF
            fi

            # Start PostgreSQL with Docker
            docker compose up -d || docker-compose up -d

            # Wait for postgres
            sleep 5

            # Install dependencies
            npm install

            # Generate Prisma client & push schema
            npx prisma generate
            npx prisma db push

            # Build the app
            npm run build

            # Setup Nginx reverse proxy
            cat > /etc/nginx/sites-available/dentai << 'NGINXEOF'
            server {
                listen 80;
                server_name _;

                location / {
                    proxy_pass http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            NGINXEOF

            ln -sf /etc/nginx/sites-available/dentai /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl restart nginx

            # Start app with PM2
            cd /opt/dentai
            pm2 delete dentai 2>/dev/null || true
            pm2 start npm --name "dentai" -- start
            pm2 save
            pm2 startup systemd -u root --hp /root

            echo ""
            echo "=== Setup Complete ==="
            echo "App running at: http://185.198.74.185"
